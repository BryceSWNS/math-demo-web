<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <!-- axes -->
  <line x1="30" y1="155" x2="280" y2="155" stroke="black" stroke-width="1.5"/>
  <line x1="30" y1="155" x2="30" y2="10" stroke="black" stroke-width="1.5"/>
  <polygon points="280,155 274,151 274,159" fill="black"/>
  <polygon points="30,10 26,16 34,16" fill="black"/>
  <!-- rectangle top and right (dashed) -->
  <line x1="30" y1="30" x2="250" y2="30" stroke="black" stroke-width="0.9" stroke-dasharray="5,3"/>
  <line x1="250" y1="30" x2="250" y2="155" stroke="black" stroke-width="0.9" stroke-dasharray="5,3"/>
  <!-- shaded area A under half-sine curve -->
  <polygon points="30,155 38,148 46,139 54,130 62,121 70,112 78,104 86,97 94,91 102,86 110,82 118,79 126,77 134,76 142,76 150,77 158,79 166,82 174,86 182,91 190,97 198,104 206,112 214,121 222,130 230,139 238,148 246,154 250,155"
           fill="#d1d5db" fill-opacity="0.65" stroke="none"/>
  <!-- half-sine curve -->
  <polyline points="30,155 38,148 46,139 54,130 62,121 70,112 78,104 86,97 94,91 102,86 110,82 118,79 126,77 134,76 142,76 150,77 158,79 166,82 174,86 182,91 190,97 198,104 206,112 214,121 222,130 230,139 238,148 246,154 250,155"
            fill="none" stroke="black" stroke-width="1.5"/>
  <!-- dashed horizontal line at l/2 (peak height) -->
  <line x1="30" y1="76" x2="142" y2="76" stroke="black" stroke-width="0.6" stroke-dasharray="3,2"/>
  <!-- tick at pi -->
  <line x1="250" y1="155" x2="250" y2="160" stroke="black" stroke-width="1"/>
  <!-- tick at d/2 -->
  <line x1="25" y1="30" x2="30" y2="30" stroke="black" stroke-width="1"/>
  <!-- axis labels -->
  <text x="275" y="172" font-size="14" font-family="serif" font-style="italic">&#966;</text>
  <text x="15" y="14" font-size="14" font-family="serif" font-style="italic">x</text>
  <text x="22" y="172" font-size="13" font-family="serif" font-style="italic">O</text>
  <text x="244" y="172" font-size="13" font-family="serif" font-style="italic">&#960;</text>
  <!-- d/2 on y-axis -->
  <text x="4" y="34" font-size="13" font-family="serif" font-style="italic">d</text>
  <line x1="4" y1="36" x2="16" y2="36" stroke="black" stroke-width="0.8"/>
  <text x="6" y="48" font-size="13" font-family="serif">2</text>
  <!-- curve label -->
  <text x="88" y="66" font-size="13" font-family="serif" font-style="italic">l</text>
  <line x1="86" y1="68" x2="98" y2="68" stroke="black" stroke-width="0.8"/>
  <text x="89" y="80" font-size="13" font-family="serif">2</text>
  <text x="102" y="72" font-size="13" font-family="serif"> sin </text>
  <text x="130" y="72" font-size="13" font-family="serif" font-style="italic">&#966;</text>
  <!-- Omega at top-right -->
  <text x="255" y="26" font-size="15" font-family="serif" font-style="italic">&#937;</text>
  <!-- A label -->
  <text x="130" y="130" font-size="16" font-family="serif" font-style="italic">A</text>
</svg>
